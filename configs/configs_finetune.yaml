defaults:
  - env: dmc_vision
  - model: size12M
  - override hydra/job_logging: disabled
  - _self_

logdir: logdir/${now:%Y-%m-%d}/${now:%H-%M-%S}
seed: 0
deterministic_run: False
device: 'cuda:0'

# Path to stage-1 clean checkpoint (must be overridden on the CLI).
ckpt_path: ???

hydra:
  run:
    dir: ${logdir}

batch_size: 16
batch_length: 64

buffer:
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  max_size: 5e5
  device: ${device}
  storage_device: 'cuda:0'

trainer:
  # Fine-tune is MUCH shorter than stage-1 (1e6). Override via CLI if needed.
  steps: 2e5
  pretrain: 0
  eval_every: 1e4
  eval_episode_num: ${env.eval_episode_num}
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  train_ratio: ${env.train_ratio}
  video_pred_log: False
  params_hist_log: False
  update_log_every: 1e3
  action_repeat: ${env.action_repeat}

backdoor:
  # Poisoned fraction of each sampled batch (remaining is clean for L_f).
  poison_ratio: 0.3
  # ---------- Trigger type ----------
  #   white — fixed patch (bottom-right, trigger_size × trigger_size px, intensity=1.0)
  #   invis — learned additive δ co-optimised via PGD, ||δ||∞ ≤ trigger_eps / 255
  trigger_type: invis
  # white: patch side length in pixels
  trigger_size: 8
  trigger_intensity: 1.0
  # invis: L∞ budget in pixel units 0–255 (e.g. 8 → ε = 8/255 ≈ 0.031 in [0,1])
  trigger_eps: 8
  # invis: SGD learning rate for the PGD trigger update
  trigger_lr: 1.0e-3
  # Injection window length K (-1 = persistent, i.e. K = T - t*; 1 = single frame).
  window_K: -1
  # Loss weights (see paper §3.3, Eq. 5):
  #   L = L_f_wm  +  lambda_pi * L_f_pi    (clean steps)
  #     + alpha  * L_a         + beta * L_s_pi    (trigger steps)
  alpha: 1.0
  beta: 1.0
  # Policy-level fidelity weight (§3.5, Eq. 11). Raise to 3.0 if CR still drifts;
  # lower to 0.3 if ASR converges too slowly.
  lambda_pi: 1.0
  # Number of random non-target actions a' sampled per trigger step for L_s_pi (§3.6).
  selectivity_K: 4
  # Target action a_dagger. null -> ones(act_dim). Otherwise a list of length act_dim.
  target_action: null
  # ASR / FTR criterion: cos_sim(action, target) > asr_threshold AND ||action|| >= asr_min_norm.
  asr_threshold: 0.9
  asr_min_norm: 0.1
  # Full triggered eval: sample t* per env from Uniform[0, eval_t_max), apply window_K
  # frames of trigger (matching train distribution).  Set to match expected episode length.
  eval_t_max: 500
  # Single-step trigger eval: inject trigger at exactly this agent-decision step, then
  # run the rest of the episode clean.  ASR/MSE are measured from this step onward,
  # testing whether ONE poisoned frame corrupts the RSSM state persistently.
  # Set to -1 to disable.  Default 250 = midpoint of a 500-step episode.
  eval_trigger_step: 250
