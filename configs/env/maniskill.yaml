task: 'maniskill_push-cube'
steps: 1.01e6
env_num: 8
eval_episode_num: 10
action_repeat: 1
train_ratio: 512
time_limit: 50

seed: ${seed}
device: ${device}

size: [96, 96]
encoder:
  mlp_keys: '$^'
  cnn_keys: 'image'
decoder:
  mlp_keys: '$^'
  cnn_keys: 'image'

# ManiSkill3 pixel configuration. Keep obs_mode=state internally, render RGB
# separately, and expose both image/state through the Dreamer-style wrapper.
camera: null
control_mode: null
shader_pack: minimal
robot_uids: null
